services:
  api-deps:
    build:
      context: .
      dockerfile: ./apps/node.Dockerfile
      target: dev
      args:
        APP: api
    volumes:
      - .:/home/node/root
      - api_node_modules:/home/node/root/apps/api/node_modules
    command: npm ci

  api:
    build:
      context: .
      dockerfile: ./apps/node.Dockerfile
      target: dev
      args:
        APP: api
    environment:
      KEYS_PATH: /home/node/root/keys.yaml
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 9000
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - 9000:9000
    volumes:
      - .:/home/node/root
      - api_node_modules:/home/node/root/apps/api/node_modules
    # working_dir: /home/node/root/apps/api
    command: npm run start:dev
    depends_on:
      api-deps:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 3

  ui-deps:
    build:
      context: .
      dockerfile: ./apps/node.Dockerfile
      target: dev
      args:
        APP: ui
    volumes:
      - .:/home/node/root
      - ui_node_modules:/home/node/root/apps/ui/node_modules
    command: npm ci

  ui:
    build:
      context: .
      dockerfile: ./apps/node.Dockerfile
      target: dev
      args:
        APP: ui
    environment:
      API_URL: http://api:9000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 9999
    ports:
      - 9999:9999
    volumes:
      - .:/home/node/root
      - ui_node_modules:/home/node/root/apps/ui/node_modules
    # working_dir: /home/node/root/apps/ui
    command: npm run start:dev
    depends_on:
      ui-deps:
        condition: service_completed_successfully
      api:
        condition: service_healthy
      worker_v1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9999 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 3

  worker_v1: &worker
    build:
      context: .
      dockerfile: ./apps/golang.Dockerfile
      target: dev
      args:
        APP: worker
    environment: &worker-envvars
      KEYS_PATH: /go/root/keys.yaml
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TEMPORAL_ADDRESS: temporal:7233
      WORKER_PROFILE: v1
      WORKER_DEPLOYMENT_NAME: mortgage-worker
      WORKER_BUILD_ID: mortgage-worker-v1
    volumes:
      - ./apps/worker:/go/root/apps/worker
      - ./keys.yaml:/go/root/keys.yaml
    depends_on:
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 3

  worker_v2:
    <<: *worker
    profiles:
      - v2
    environment:
      <<: *worker-envvars
      WORKER_PROFILE: v2
      WORKER_BUILD_ID: mortgage-worker-v2

  worker-version:
    image: temporalio/temporal
    restart: "no"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      WORKER_DEPLOYMENT_NAME: mortgage-worker
      DEPLOYMENT_VERSION: mortgage-worker-v1
      VERSIONING_INIT_RETRIES: 30
      VERSIONING_INIT_SLEEP_SECONDS: 2
      BOOTSTRAP_ONLY: 1
    volumes:
      - ./dev/set-worker-version.sh:/scripts/set-worker-version.sh:ro
    depends_on:
      temporal:
        condition: service_healthy
      worker_v1:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        exec /scripts/set-worker-version.sh

  # Example codec server, to decrypt payloads in the Temporal Web UI
  codec-server:
    image: ghcr.io/mrsimonemms/temporal-codec-server/golang
    environment:
      CORS_ALLOW_CREDS: false
      DISABLE_AUTH: true
      ENCRYPTION_TYPES: aes
      KEYS_PATH: /keys.yaml
      PORT: 8080
    ports:
      - 8080:8080
    volumes:
      - ./keys.yaml:/keys.yaml

  temporal:
    image: temporalio/temporal
    ports:
      - 8233:8233
    command: >
      server start-dev --ip 0.0.0.0 --search-attribute ApplicationStatus=Keyword
      --search-attribute CurrentStep=Keyword --search-attribute HasOffer=Bool
      --search-attribute AwaitingExternalSignal=Bool --search-attribute
      WithinSLA=Bool --ui-codec-endpoint http://localhost:8080
    depends_on:
      # Not really a dependency of Temporal, but ensures everything starts up together
      codec-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 10s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus
    ports:
      - 9090:9090
    volumes:
      - ./dev/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana
    ports:
      - 3000:3000
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_BASIC_ENABLED: "false"
    volumes:
      - ./dev/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./dev/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./dev/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  ui_node_modules:
  api_node_modules:
